<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer — Question Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f;--bg2:#141414;--bg3:#1e1e1e;--bg4:#262626;
    --card:#181818;--border:#242424;--border2:#333;
    --text:#f0ede6;--text2:#b0ada6;--text3:#707068;
    --green:#1D9E75;--green-bg:#0d2a1c;--green-text:#4dc99a;
    --red:#E24B4A;--red-bg:#2e1515;--red-text:#f07070;
    --amber:#d4890a;--amber-bg:#2a1e08;--amber-text:#f0a830;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);height:100vh;display:flex;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:28px 18px;display:flex;flex-direction:column;flex-shrink:0;}
  .logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:36px;}
  .logo span{color:var(--green);}
  .nav-section{margin-bottom:24px;}
  .nav-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-left:10px;}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--text3);margin-bottom:1px;cursor:pointer;text-decoration:none;transition:all .15s;}
  .nav-item:hover{color:var(--text2);background:var(--bg3);}
  .nav-item.active{background:var(--bg3);color:var(--text);}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--bg4);flex-shrink:0;}
  .nav-item.active .nav-dot{background:var(--green);}
  .sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:16px;}
  .coach-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;}
  .coach-av-wrap{position:relative;flex-shrink:0;}
  .coach-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green),#0d6e50);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
  .online-dot{position:absolute;bottom:1px;right:1px;width:8px;height:8px;background:var(--green);border-radius:50%;border:2px solid var(--bg2);}
  .coach-name{font-size:13px;color:var(--text);font-weight:500;}
  .coach-role{font-size:11px;color:var(--text3);}

  /* Layout */
  .panels{flex:1;display:flex;overflow:hidden;}

  /* Athlete list panel */
  .panel-athletes{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .panel-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
  .panel-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}
  .panel-sub{font-size:12px;color:var(--text3);margin-top:3px;}
  .athlete-list{flex:1;overflow-y:auto;}
  .athlete-row{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
  .athlete-row:hover{background:var(--bg3);}
  .athlete-row.active{background:var(--bg3);border-left:2px solid var(--green);}
  .ar-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:linear-gradient(135deg,#262626,#1a1a1a);color:var(--text2);border:1px solid var(--border2);}
  .ar-info{flex:1;min-width:0;}
  .ar-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
  .ar-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Question panel */
  .panel-questions{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .question-header{padding:20px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .question-athlete-name{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}
  .question-subtitle{font-size:12px;color:var(--text3);margin-top:2px;}
  .question-body{flex:1;overflow-y:auto;padding:20px 28px 28px;}

  /* Section labels */
  .q-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;margin-top:20px;}
  .q-section-label:first-child{margin-top:0;}

  /* Question row */
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:border-color .15s;}
  .question-card:hover{border-color:var(--border2);}
  .question-card.disabled{opacity:0.45;}
  .q-drag{color:var(--text3);font-size:14px;cursor:grab;flex-shrink:0;user-select:none;}
  .q-content{flex:1;min-width:0;}
  .q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;}
  .q-hint{font-size:12px;color:var(--text3);font-style:italic;}
  .q-meta{display:flex;align-items:center;gap:8px;margin-top:5px;}
  .q-type-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
  .q-type-scale{background:var(--green-bg);color:var(--green-text);border:1px solid #1a4a30;}
  .q-type-text{background:#1a1a2a;color:#8090c0;border:1px solid #2a2a4a;}
  .q-type-yes_no{background:var(--amber-bg);color:var(--amber-text);border:1px solid #3a2a10;}
  .q-core-badge{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);padding:2px 8px;border-radius:99px;}
  .q-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .q-edit-btn{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
  .q-edit-btn:hover{color:var(--text2);}
  .q-delete-btn{font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 6px;transition:color .15s;}
  .q-delete-btn:hover{color:var(--red-text);}

  /* Toggle switch */
  .toggle-wrap{display:flex;align-items:center;flex-shrink:0;}
  .toggle{position:relative;width:40px;height:22px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;inset:0;background:var(--bg4);border-radius:99px;transition:.2s;border:1px solid var(--border2);}
  .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:var(--text3);border-radius:50%;transition:.2s;}
  .toggle input:checked + .toggle-slider{background:var(--green);border-color:var(--green);}
  .toggle input:checked + .toggle-slider:before{transform:translateX(18px);background:#fff;}

  /* Add question form */
  .add-question-card{background:var(--card);border:1px dashed var(--border2);border-radius:12px;padding:16px;margin-top:8px;}
  .add-q-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;}
  .add-q-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
  .add-q-input{flex:1;background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;resize:none;}
  .add-q-input:focus{border-color:var(--green);}
  .add-q-input::placeholder{color:var(--text3);}
  .add-q-select{background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;min-width:120px;}
  .add-q-select:focus{border-color:var(--green);}
  .add-q-select option{background:var(--bg2);}
  .add-q-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .add-q-btn:hover{background:#18875f;}

  /* Empty/loading states */
  .empty-panel{flex:1;display:flex;align-items:center;justify-content:center;}
  .empty-inner{text-align:center;padding:40px;}
  .empty-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text2);margin-bottom:8px;}
  .empty-sub{font-size:14px;color:var(--text3);line-height:1.6;}
  .loading-inline{padding:40px;text-align:center;font-size:13px;color:var(--text3);}
  .spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}

  /* Edit modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:420px;padding:24px;animation:fadeUp .2s ease forwards;}
  .modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:18px;}
  .modal-field{margin-bottom:12px;}
  .modal-label{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
  .modal-input,.modal-select{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;resize:none;}
  .modal-input:focus,.modal-select:focus{border-color:var(--green);}
  .modal-select option{background:var(--bg2);}
  .modal-btns{display:flex;gap:8px;margin-top:6px;}
  .modal-save{flex:1;background:var(--green);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .modal-cancel{background:var(--bg3);color:var(--text3);border:1px solid var(--border2);border-radius:8px;padding:11px 18px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;}

  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Layer<span>.</span></div>
  <div class="nav-section">
    <div class="nav-label">Coach</div>
    <a class="nav-item" id="nav-roster" href="dashboard.html"><div class="nav-dot"></div>Daily roster</a>
    <a class="nav-item" id="nav-messages" href="messages.html"><div class="nav-dot"></div>Messages</a>
    <a class="nav-item" id="nav-macro" href="macro.html"><div class="nav-dot"></div>Macro trends</a>
    <a class="nav-item" id="nav-athletes" href="athletes.html"><div class="nav-dot"></div>Athlete profiles</a>
    <a class="nav-item" id="nav-zones" href="zones.html"><div class="nav-dot"></div>Zones &amp; power</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Settings</div>
    <a class="nav-item active" id="nav-questions" href="questions.html"><div class="nav-dot"></div>Question builder</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div>Integrations</a>
  </div>
  <div class="sidebar-bottom">
    <div class="coach-chip">
      <div class="coach-av-wrap">
        <div class="coach-av" id="coach-av">?</div>
        <div class="online-dot"></div>
      </div>
      <div>
        <div class="coach-name" id="coach-name">Loading…</div>
        <div class="coach-role">Layer · Coach</div>
      </div>
    </div>
  </div>
</div>

<div class="panels">
  <!-- Athlete list -->
  <div class="panel-athletes">
    <div class="panel-header">
      <div class="panel-title">Question builder</div>
      <div class="panel-sub" id="panel-sub">Select an athlete</div>
    </div>
    <div class="athlete-list" id="athlete-list">
      <div class="loading-inline"><div class="spinner"></div>Loading…</div>
    </div>
  </div>

  <!-- Question panel -->
  <div class="panel-questions" id="panel-questions">
    <div class="empty-panel">
      <div class="empty-inner">
        <div class="empty-title">Select an athlete</div>
        <div class="empty-sub">Choose an athlete to view and customise their daily check-in questions.</div>
      </div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Edit question</div>
    <input type="hidden" id="edit-q-id"/>
    <div class="modal-field">
      <label class="modal-label">Question text</label>
      <textarea class="modal-input" id="edit-q-text" rows="2" placeholder="e.g. How is your energy today?"></textarea>
    </div>
    <div class="modal-field">
      <label class="modal-label">Hint (optional)</label>
      <input class="modal-input" id="edit-q-hint" type="text" placeholder="e.g. Consider sleep, stress, nutrition"/>
    </div>
    <div class="modal-field">
      <label class="modal-label">Answer type</label>
      <select class="modal-select" id="edit-q-type">
        <option value="scale">Scale 1–5</option>
        <option value="text">Free text</option>
        <option value="yes_no">Yes / No</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://eaqlyzvggjewavyxpbwk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcWx5enZnZ2pld2F2eXhwYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTI4NTgsImV4cCI6MjA5MjA2ODg1OH0.0zCSvFLEzQqmro9YxF-VjuAAHNfs1gWZbyqH22YQwJ8';
const _p=new URLSearchParams(window.location.search);
const COACH_ID=_p.get('coach')||'051dbc7b-15ad-45e0-bdb1-5bf19a7144c8';
const headers={'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};

if(_p.get('coach')){
  document.getElementById('nav-roster').href   =`dashboard.html?coach=${COACH_ID}`;
  document.getElementById('nav-messages').href =`messages.html?coach=${COACH_ID}`;
  document.getElementById('nav-macro').href    =`macro.html?coach=${COACH_ID}`;
  document.getElementById('nav-athletes').href =`athletes.html?coach=${COACH_ID}`;
  document.getElementById('nav-zones').href    =`zones.html?coach=${COACH_ID}`;
  document.getElementById('nav-questions').href=`questions.html?coach=${COACH_ID}`;
}

async function api(path){const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers});return r.json();}
function getInitials(n){return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}

let currentAthlete=null;
let coreQuestions=[];
let customQuestions=[];
let settingsMap={}; // question_id -> enabled

async function init(){
  const coaches=await api(`coaches?id=eq.${COACH_ID}`);
  if(coaches&&coaches[0]){document.getElementById('coach-name').textContent=coaches[0].name;document.getElementById('coach-av').textContent=getInitials(coaches[0].name);}

  const athletes=await api(`athletes?coach_id=eq.${COACH_ID}&order=name.asc`);
  document.getElementById('panel-sub').textContent=`${athletes.length} athlete${athletes.length!==1?'s':''}`;

  if(!athletes.length){
    document.getElementById('athlete-list').innerHTML='<div class="loading-inline">No athletes yet.</div>';
    return;
  }

  document.getElementById('athlete-list').innerHTML=athletes.map(a=>`
    <div class="athlete-row" id="ar-${a.id}" onclick="selectAthlete('${a.id}','${a.name.replace(/'/g,"\\'")}')">
      <div class="ar-av">${getInitials(a.name)}</div>
      <div class="ar-info">
        <div class="ar-name">${a.name}</div>
        <div class="ar-sub">${a.email}</div>
      </div>
    </div>`).join('');

  // Auto-select from URL
  const urlAthlete=_p.get('athlete');
  if(urlAthlete) selectAthlete(urlAthlete, athletes.find(a=>a.id===urlAthlete)?.name||'');
}

async function selectAthlete(athleteId, name){
  currentAthlete={id:athleteId, name};
  document.querySelectorAll('.athlete-row').forEach(r=>r.classList.remove('active'));
  const row=document.getElementById(`ar-${athleteId}`);
  if(row) row.classList.add('active');

  const panel=document.getElementById('panel-questions');
  panel.innerHTML='<div class="loading-inline"><div class="spinner"></div>Loading questions…</div>';

  // Fetch core questions, custom questions, and settings
  [coreQuestions, customQuestions]=await Promise.all([
    api(`questions?is_core=eq.true&order=created_at.asc`),
    api(`custom_questions?athlete_id=eq.${athleteId}&order=sort_order.asc,created_at.asc`),
  ]);
  if(!Array.isArray(coreQuestions)) coreQuestions=[];
  if(!Array.isArray(customQuestions)) customQuestions=[];
  const settings=await api(`athlete_questions?athlete_id=eq.${athleteId}`);
  settingsMap={};
  if(Array.isArray(settings)) settings.forEach(s=>settingsMap[s.question_id]=s.enabled);

  renderQuestions();
}

function renderQuestions(){
  const panel=document.getElementById('panel-questions');
  const athleteName=currentAthlete?.name||'Athlete';

  const coreHtml=coreQuestions.map(q=>{
    const enabled=settingsMap[q.id]!==false; // default on
    return `
      <div class="question-card ${enabled?'':'disabled'}" id="qcard-${q.id}">
        <div class="q-content">
          <div class="q-text">${q.text}</div>
          ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
          <div class="q-meta">
            <span class="q-type-badge q-type-${q.type||'scale'}">${typeLabel(q.type||'scale')}</span>
            <span class="q-core-badge">Core</span>
          </div>
        </div>
        <div class="q-actions">
          <label class="toggle" title="${enabled?'Disable for this athlete':'Enable for this athlete'}">
            <input type="checkbox" ${enabled?'checked':''} onchange="toggleCoreQuestion('${q.id}',this.checked)"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>`;
  }).join('');

  const customHtml=customQuestions.map((q,i)=>{
    const enabled=q.enabled!==false;
    return `
      <div class="question-card ${enabled?'':'disabled'}" id="qcard-custom-${q.id}">
        <div class="q-content">
          <div class="q-text">${q.text}</div>
          ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
          <div class="q-meta">
            <span class="q-type-badge q-type-${q.type||'text'}">${typeLabel(q.type||'text')}</span>
          </div>
        </div>
        <div class="q-actions">
          <button class="q-edit-btn" onclick="openEdit('${q.id}','${q.text.replace(/'/g,"\\'")}','${(q.hint||'').replace(/'/g,"\\'")}','${q.type||'text'}')">Edit</button>
          <button class="q-delete-btn" onclick="deleteCustomQuestion('${q.id}')" title="Delete">✕</button>
          <label class="toggle" title="${enabled?'Disable':'Enable'}">
            <input type="checkbox" ${enabled?'checked':''} onchange="toggleCustomQuestion('${q.id}',this.checked)"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>`;
  }).join('');

  panel.innerHTML=`
    <div class="question-header">
      <div>
        <div class="question-athlete-name">${athleteName}</div>
        <div class="question-subtitle">Daily check-in questions · changes take effect immediately</div>
      </div>
    </div>
    <div class="question-body">
      <div class="q-section-label">Core questions</div>
      ${coreHtml}

      <div class="q-section-label" style="margin-top:24px;">Custom questions</div>
      ${customHtml || '<div style="font-size:13px;color:var(--text3);font-style:italic;margin-bottom:12px;">No custom questions yet.</div>'}

      <!-- Add question form -->
      <div class="add-question-card">
        <div class="add-q-title">+ Add a question</div>
        <div class="add-q-row">
          <textarea class="add-q-input" id="new-q-text" rows="2" placeholder="e.g. How is your nutrition today?"></textarea>
        </div>
        <div class="add-q-row">
          <input class="add-q-input" id="new-q-hint" type="text" placeholder="Hint (optional) — e.g. Think about meals and hydration"/>
          <select class="add-q-select" id="new-q-type">
            <option value="scale">Scale 1–5</option>
            <option value="text">Free text</option>
            <option value="yes_no">Yes / No</option>
          </select>
          <button class="add-q-btn" onclick="addQuestion()">Add</button>
        </div>
      </div>
    </div>`;
}

function typeLabel(t){
  return t==='scale'?'Scale 1–5':t==='yes_no'?'Yes / No':'Free text';
}

async function toggleCoreQuestion(questionId, enabled){
  const card=document.getElementById(`qcard-${questionId}`);
  if(card) card.classList.toggle('disabled',!enabled);
  settingsMap[questionId]=enabled;

  await fetch(`${SUPABASE_URL}/rest/v1/athlete_questions`,{
    method:'POST',
    headers:{...headers,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({athlete_id:currentAthlete.id,question_id:questionId,enabled})
  });
}

async function toggleCustomQuestion(questionId, enabled){
  const card=document.getElementById(`qcard-custom-${questionId}`);
  if(card) card.classList.toggle('disabled',!enabled);

  await fetch(`${SUPABASE_URL}/rest/v1/custom_questions?id=eq.${questionId}`,{
    method:'PATCH',
    headers:{...headers,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({enabled})
  });
}

async function addQuestion(){
  const text=document.getElementById('new-q-text').value.trim();
  const hint=document.getElementById('new-q-hint').value.trim();
  const type=document.getElementById('new-q-type').value;
  if(!text){document.getElementById('new-q-text').focus();return;}

  const res=await fetch(`${SUPABASE_URL}/rest/v1/custom_questions`,{
    method:'POST',
    headers:{...headers,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify({athlete_id:currentAthlete.id,coach_id:COACH_ID,text,hint:hint||null,type,enabled:true,sort_order:customQuestions.length})
  });
  const data=await res.json();
  if(Array.isArray(data)) customQuestions.push(data[0]);
  document.getElementById('new-q-text').value='';
  document.getElementById('new-q-hint').value='';
  renderQuestions();
}

async function deleteCustomQuestion(questionId){
  if(!confirm('Delete this question?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/custom_questions?id=eq.${questionId}`,{
    method:'DELETE', headers
  });
  customQuestions=customQuestions.filter(q=>q.id!==questionId);
  renderQuestions();
}

function openEdit(id, text, hint, type){
  document.getElementById('edit-q-id').value=id;
  document.getElementById('edit-q-text').value=text;
  document.getElementById('edit-q-hint').value=hint;
  document.getElementById('edit-q-type').value=type;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('edit-q-text').focus(),100);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

async function saveEdit(){
  const id=document.getElementById('edit-q-id').value;
  const text=document.getElementById('edit-q-text').value.trim();
  const hint=document.getElementById('edit-q-hint').value.trim();
  const type=document.getElementById('edit-q-type').value;
  if(!text) return;

  await fetch(`${SUPABASE_URL}/rest/v1/custom_questions?id=eq.${id}`,{
    method:'PATCH',
    headers:{...headers,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({text,hint:hint||null,type})
  });

  const q=customQuestions.find(q=>q.id===id);
  if(q){q.text=text;q.hint=hint;q.type=type;}
  closeModal();
  renderQuestions();
}

init().catch(console.error);
</script>
</body>
