<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer — Coach Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f0eb;
    --card: #ffffff;
    --dark: #1a1a1a;
    --mid: #555550;
    --light: #99998f;
    --border: #e0ddd6;
    --green: #1D9E75;
    --green-light: #EAF3DE;
    --red: #E24B4A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--dark);
    margin-bottom: 32px;
    text-align: center;
  }
  .logo span { color: var(--green); }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--dark);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .card-sub {
    font-size: 14px;
    color: var(--light);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--green); }
  input::placeholder { color: var(--light); }

  .submit-btn {
    width: 100%;
    background: var(--dark);
    color: #f2f0eb;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    display: none;
    background: #FCEBEB;
    border: 1px solid #F09595;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
  }

  .success-screen {
    display: none;
    text-align: center;
    padding: 20px 0;
  }

  .success-icon {
    width: 60px;
    height: 60px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 26px;
    color: var(--green);
  }

  .success-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--dark);
    margin-bottom: 10px;
  }

  .success-sub {
    font-size: 14px;
    color: var(--light);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .dashboard-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--dark);
    color: #f2f0eb;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }

  .dashboard-btn:hover { background: #333; }

  .beta-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--light);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .wrap { animation: fadeUp 0.4s ease forwards; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Layer<span>.</span></div>

  <div class="card">
    <div id="form-view">
      <div class="card-title">Join as a coach.</div>
      <div class="card-sub">Beta access — enter your details to get started. Your dashboard will be ready immediately.</div>

      <div class="field">
        <label>Full name</label>
        <input type="text" id="name" placeholder="Alex Thompson" autocomplete="name"/>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" placeholder="alex@example.com" autocomplete="email"/>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="signup()">
        <span id="btn-text">Create my account →</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="success-screen" id="success-screen">
      <div class="success-icon">✓</div>
      <div class="success-title">You're in.</div>
      <div class="success-sub" id="success-sub">Welcome to Layer. Your dashboard is ready.</div>
      <a class="dashboard-btn" id="dashboard-link" href="dashboard.html">Go to dashboard →</a>
    </div>
  </div>

  <div class="beta-note">Layer · Beta · Invite only</div>
</div>

<script>
  const SUPABASE_URL = 'https://eaqlyzvggjewavyxpbwk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcWx5enZnZ2pld2F2eXhwYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTI4NTgsImV4cCI6MjA5MjA2ODg1OH0.0zCSvFLEzQqmro9YxF-VjuAAHNfs1gWZbyqH22YQwJ8';

  async function signup() {
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();

    if (!name || !email) {
      showError('Please enter your name and email.');
      return;
    }

    if (!email.includes('@') || !email.includes('.')) {
      showError('Please enter a valid email address.');
      return;
    }

    // Show loading
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('btn-text').textContent = 'Creating account…';
    document.getElementById('spinner').style.display = 'block';

    try {
      // Check if email already exists
      const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/coaches?email=eq.${encodeURIComponent(email)}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      const existing = await checkRes.json();

      if (existing && existing.length > 0) {
        // Coach already exists — just send them to dashboard
        showSuccess(name, existing[0].id);
        return;
      }

      // Create new coach
      const res = await fetch(`${SUPABASE_URL}/rest/v1/coaches`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify({ name, email, subscription_tier: 'beta' })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'Signup failed');
      }

      const data = await res.json();
      const coachId = data[0]?.id;
      showSuccess(name, coachId);

    } catch (err) {
      showError('Something went wrong. Please try again.');
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('btn-text').textContent = 'Create my account →';
      document.getElementById('spinner').style.display = 'none';
      console.error(err);
    }
  }

  function showSuccess(name, coachId) {
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('success-sub').textContent =
      `Welcome to Layer, ${name.split(' ')[0]}. Your dashboard is ready — you can start adding athletes straight away.`;
    // Pass coach id to dashboard via URL
    document.getElementById('dashboard-link').href = `dashboard.html?coach=${coachId}`;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('btn-text').textContent = 'Create my account →';
    document.getElementById('spinner').style.display = 'none';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  // Allow enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') signup();
  });
</script>
</body>
</html>
