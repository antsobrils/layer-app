<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer — Coach Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #141414;
    --bg3: #1a1a1a;
    --bg4: #222222;
    --card: #161616;
    --border: #1f1f1f;
    --border2: #2a2a2a;
    --text: #f2f0eb;
    --text2: #888880;
    --text3: #444440;
    --green: #1D9E75;
    --green-bg: #0a1f14;
    --red: #E24B4A;
    --red-bg: #2a1515;
    --amber: #BA7517;
    --amber-bg: #1f1808;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  .sidebar {
    width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: fixed;
    height: 100vh;
  }

  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 36px; }
  .logo span { color: var(--green); }

  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

  .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; color: var(--text2); margin-bottom: 2px; cursor: pointer; text-decoration: none; }
  .nav-item.active { background: var(--bg3); color: var(--text); }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg4); flex-shrink: 0; }
  .nav-item.active .nav-dot { background: var(--green); }

  .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 16px; }

  .coach-chip { display: flex; align-items: center; gap: 9px; background: var(--bg3); border-radius: 10px; padding: 10px 12px; }
  .coach-av { width: 30px; height: 30px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .coach-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .coach-role { font-size: 10px; color: var(--text3); }

  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 24px 32px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); }
  .page-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .stat-chip { background: var(--bg3); border-radius: 99px; padding: 6px 14px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .chip-num { font-weight: 600; }
  .chip-num.r { color: var(--red); }
  .chip-num.g { color: var(--green); }
  .chip-num.a { color: var(--amber); }

  .content { padding: 24px 32px; flex: 1; }

  .date-label { font-size: 11px; color: var(--text3); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

  .athlete-card { background: var(--card); border-radius: 14px; margin-bottom: 10px; border-left: 3px solid transparent; animation: fadeUp 0.3s ease forwards; }
  .athlete-card.flagged { border-left-color: var(--red); }
  .athlete-card.noted   { border-left-color: var(--amber); }
  .athlete-card.great   { border-left-color: var(--green); }
  .athlete-card.clean   { border-left-color: var(--border2); }

  .card-inner { padding: 16px 20px; }

  .athlete-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .av-r { background: var(--red-bg); color: var(--red); }
  .av-a { background: var(--amber-bg); color: var(--amber); }
  .av-g { background: var(--green-bg); color: var(--green); }
  .av-d { background: var(--bg3); color: var(--text2); }

  .athlete-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .athlete-time { font-size: 11px; color: var(--text3); }
  .badges { margin-left: auto; display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .badge-r { background: var(--red-bg); color: var(--red); }
  .badge-a { background: var(--amber-bg); color: var(--amber); }
  .badge-g { background: var(--green-bg); color: var(--green); }

  .note-bubble { background: var(--bg3); border-radius: 10px; padding: 11px 14px; font-size: 13px; color: #ccc; font-style: italic; line-height: 1.6; margin-bottom: 12px; }
  .note-empty { font-size: 12px; color: var(--text3); font-style: italic; margin-bottom: 10px; }

  .metrics-row { display: flex; gap: 7px; }
  .metric { flex: 1; background: var(--bg3); border-radius: 9px; padding: 8px 6px; text-align: center; }
  .metric.alert { background: var(--red-bg); }
  .metric.warn  { background: var(--amber-bg); }
  .metric.great { background: var(--green-bg); }
  .m-label { font-size: 9px; color: var(--text3); display: block; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .m-val { font-size: 16px; font-weight: 600; color: var(--text); display: block; }
  .metric.alert .m-val { color: var(--red); }
  .metric.warn  .m-val { color: var(--amber); }
  .metric.great .m-val { color: var(--green); }
  .m-trend { font-size: 9px; color: var(--text3); display: block; margin-top: 2px; }

  .copy-link-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 12px; font-size: 11px; color: var(--text2); cursor: pointer; margin-left: 8px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .copy-link-btn:hover { background: var(--bg4); color: var(--text); }

  .not-submitted { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .ns-label { font-size: 13px; color: var(--text3); }

  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 16px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 13px; color: var(--text3); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text2); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Layer<span>.</span></div>
  <div style="margin-bottom: 20px;">
    <div class="nav-label">Coach</div>
    <a class="nav-item active" href="dashboard.html"><div class="nav-dot"></div>Daily roster</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div>Macro trends</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div>Athlete profiles</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div>Race calendar</a>
  </div>
  <div>
    <div class="nav-label">Settings</div>
    <a class="nav-item" href="#"><div class="nav-dot"></div>Question builder</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div>Integrations</a>
  </div>
  <div class="sidebar-bottom">
    <div class="coach-chip">
      <div class="coach-av" id="coach-av">?</div>
      <div>
        <div class="coach-name" id="coach-name">Loading…</div>
        <div class="coach-role">Layer · Coach</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="page-title">Good morning</div>
      <div class="page-sub" id="page-sub">Loading your roster…</div>
    </div>
    <div class="topbar-right">
      <div class="stat-chip"><span class="chip-num r" id="flagged-count">0</span> flagged</div>
      <div class="stat-chip"><span class="chip-num a" id="noted-count">0</span> notes</div>
      <div class="stat-chip"><span class="chip-num g" id="great-count">0</span> feeling great</div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading athlete check-ins…</div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://eaqlyzvggjewavyxpbwk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcWx5enZnZ2pld2F2eXhwYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTI4NTgsImV4cCI6MjA5MjA2ODg1OH0.0zCSvFLEzQqmro9YxF-VjuAAHNfs1gWZbyqH22YQwJ8';
  const COACH_ID = '051dbc7b-15ad-45e0-bdb1-5bf19a7144c8';

  const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

  async function api(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers });
    return res.json();
  }

  function getInitials(name) {
    return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
  }

  function timeAgo(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function copyCheckinLink(athleteId, name) {
    const link = `${window.location.origin}/checkin_form.html?athlete=${athleteId}`;
    navigator.clipboard.writeText(link).then(() => {
      alert(`Check-in link for ${name} copied!`);
    });
  }

  async function loadDashboard() {
    const today = new Date().toISOString().split('T')[0];
    const hour = new Date().getHours();
    document.getElementById('page-title').textContent =
      hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

    const coaches = await api(`coaches?id=eq.${COACH_ID}`);
    if (coaches && coaches[0]) {
      document.getElementById('coach-name').textContent = coaches[0].name;
      document.getElementById('coach-av').textContent = getInitials(coaches[0].name);
    }

    const athletes = await api(`athletes?coach_id=eq.${COACH_ID}&order=name.asc`);
    if (!athletes || athletes.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-title">No athletes yet</div><div class="empty-sub">Add athletes to start seeing their check-ins.</div></div>`;
      return;
    }

    const ids = athletes.map(a => a.id);
    const responses = await api(`checkin_responses?date=eq.${today}&athlete_id=in.(${ids.join(',')})&order=created_at.asc`);
    const questions = await api(`questions?is_core=eq.true&order=created_at.asc`);

    const byAthlete = {};
    responses.forEach(r => {
      if (!byAthlete[r.athlete_id]) byAthlete[r.athlete_id] = [];
      byAthlete[r.athlete_id].push(r);
    });

    function getCategory(a) {
      const rs = byAthlete[a.id] || [];
      const scale = rs.filter(r => r.score !== null);
      if (scale.some(r => r.score <= 2)) return 'flagged';
      if (rs.some(r => r.text_response && r.text_response.trim())) return 'noted';
      if (scale.length > 0 && scale.every(r => r.score >= 4)) return 'great';
      return 'clean';
    }

    const submitted = athletes.filter(a => byAthlete[a.id]);
    const notSubmitted = athletes.filter(a => !byAthlete[a.id]);
    const order = { flagged: 0, noted: 1, great: 2, clean: 3 };
    submitted.sort((a, b) => order[getCategory(a)] - order[getCategory(b)]);

    let flagged = 0, noted = 0, great = 0;
    submitted.forEach(a => {
      const c = getCategory(a);
      if (c === 'flagged') flagged++;
      if (c === 'noted') noted++;
      if (c === 'great') great++;
    });

    document.getElementById('flagged-count').textContent = flagged;
    document.getElementById('noted-count').textContent = noted;
    document.getElementById('great-count').textContent = great;
    document.getElementById('page-sub').textContent = `${submitted.length} of ${athletes.length} athletes submitted today`;

    let html = '';

    if (submitted.length > 0) {
      html += `<div class="date-label"><span>${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</span><span>${submitted.length} submitted</span></div>`;

      submitted.forEach(a => {
        const rs = byAthlete[a.id];
        const cat = getCategory(a);
        const scaleRs = rs.filter(r => r.score !== null);
        const textR = rs.find(r => r.text_response && r.text_response.trim());
        const latest = rs.reduce((a,b) => a.created_at > b.created_at ? a : b).created_at;

        const avClass = cat==='flagged'?'av-r':cat==='noted'?'av-a':cat==='great'?'av-g':'av-d';

        let badges = '';
        if (scaleRs.some(r => r.score === 1)) badges += `<span class="badge badge-r">Score of 1</span>`;
        if (scaleRs.some(r => r.score === 2)) badges += `<span class="badge badge-a">Low score</span>`;
        if (textR && cat !== 'flagged') badges += `<span class="badge badge-a">Note left</span>`;
        if (cat === 'great') badges += `<span class="badge badge-g">Feeling great</span>`;

        const scaleQs = questions.filter(q => q.type === 'scale');
        const metrics = scaleQs.map(q => {
          const r = scaleRs.find(r => r.question_id === q.id);
          if (!r) return '';
          const cls = r.score <= 1 ? 'alert' : r.score === 2 ? 'warn' : r.score >= 5 ? 'great' : r.score >= 4 ? 'great' : '';
          return `<div class="metric ${cls}"><span class="m-label">${q.category}</span><span class="m-val">${r.score}</span><span class="m-trend">/5</span></div>`;
        }).join('');

        html += `
          <div class="athlete-card ${cat}">
            <div class="card-inner">
              <div class="athlete-row">
                <div class="av ${avClass}">${getInitials(a.name)}</div>
                <div>
                  <div class="athlete-name">${a.name}</div>
                  <div class="athlete-time">${timeAgo(latest)}</div>
                </div>
                <div class="badges">${badges}</div>
                <button class="copy-link-btn" onclick="copyCheckinLink('${a.id}','${a.name}')">Copy link</button>
              </div>
              ${textR ? `<div class="note-bubble">"${textR.text_response}"</div>` : `<div class="note-empty">No note left today</div>`}
              <div class="metrics-row">${metrics}</div>
            </div>
          </div>`;
      });
    }

    if (notSubmitted.length > 0) {
      html += `<div class="section-label" style="margin-top:20px;">Not yet submitted · ${notSubmitted.length}</div>
        <div class="not-submitted">
          <div class="ns-label">${notSubmitted.map(a => `${a.name} <button class="copy-link-btn" onclick="copyCheckinLink('${a.id}','${a.name}')">Copy link</button>`).join(' · ')}</div>
        </div>`;
    }

    if (submitted.length === 0) {
      html = `<div class="empty-state"><div class="empty-title">No check-ins yet today</div><div class="empty-sub">Share check-in links with your athletes. Their responses will appear here.</div></div>` + html;
    }

    document.getElementById('content').innerHTML = html;
  }

  loadDashboard().catch(err => {
    console.error(err);
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-title">Something went wrong</div><div class="empty-sub">Please refresh the page.</div></div>`;
  });
</script>
</body>
</html>
