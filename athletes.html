<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Layer · Athlete Profiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #141414;
    --bg2:   #1c1c1c;
    --bg3:   #222222;
    --bg4:   #2a2a2a;
    --border: #2a2a2a;
    --border2: #333;
    --text:  #f0f0f0;
    --text2: #b0b0b0;
    --text3: #666;
    --green: #1D9E75;
    --red:   #f07070;
    --amber: #f0a830;
    --blue:  #7B8FF0;
    --sidebar-w: 192px;
    --panel-w: 260px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0 20px; overflow: hidden; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); padding: 0 20px 28px; }
  .logo span { color: var(--green); }
  .nav-section { padding: 0 12px; margin-bottom: 24px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13px; color: var(--text2); text-decoration: none; transition: all 0.15s; cursor: pointer; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg3); color: var(--text); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .nav-item.active .nav-dot { background: var(--green); }
  .sidebar-bottom { margin-top: auto; padding: 0 12px; }
  .coach-chip { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; background: var(--bg3); }
  .coach-av-wrap { position: relative; flex-shrink: 0; }
  .coach-av { width: 32px; height: 32px; border-radius: 50%; background: var(--green); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); border: 2px solid var(--bg3); position: absolute; bottom: 0; right: 0; }
  .coach-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .coach-role { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── PANELS ── */
  .panels { display: flex; flex: 1; overflow: hidden; }

  /* Left panel — athlete list */
  .panel-athletes { width: var(--panel-w); min-width: var(--panel-w); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .panel-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); margin-bottom: 2px; }
  .panel-sub { font-size: 12px; color: var(--text3); }
  .athlete-list { flex: 1; overflow-y: auto; padding: 12px 0; }
  .athlete-list::-webkit-scrollbar { width: 4px; }
  .athlete-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .athlete-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
  .athlete-row:hover { background: var(--bg3); }
  .athlete-row.active { background: var(--bg3); border-left-color: var(--green); }
  .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .av-green { background: var(--green); }
  .av-blue  { background: var(--blue); }
  .av-amber { background: var(--amber); }
  .av-red   { background: #c0392b; }
  .av-gray  { background: #555; }
  .athlete-info { flex: 1; min-width: 0; }
  .athlete-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .athlete-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .flag-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  /* Right panel — profile */
  .panel-profile { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .panel-profile::-webkit-scrollbar { width: 4px; }
  .panel-profile::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-panel { flex: 1; display: flex; align-items: center; justify-content: center; }
  .empty-inner { text-align: center; padding: 40px; }
  .empty-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text2); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--text3); line-height: 1.6; }

  /* Profile header */
  .profile-topbar { display: flex; align-items: center; justify-content: space-between; padding: 24px 28px 20px; border-bottom: 1px solid var(--border); gap: 16px; }
  .profile-identity { display: flex; align-items: center; gap: 14px; }
  .profile-av { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .profile-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
  .profile-email { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .profile-actions { display: flex; gap: 8px; }
  .action-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .action-btn:hover { background: var(--bg4); color: var(--text); }

  /* Daily summary card */
  .section { padding: 24px 28px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 16px; }

  .daily-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .daily-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .daily-date { font-size: 12px; color: var(--text3); }
  .daily-submitted { font-size: 12px; color: var(--text3); }
  .flag-badge { background: rgba(240,112,112,0.15); color: var(--red); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(240,112,112,0.3); }
  .ok-badge   { background: rgba(29,158,117,0.12); color: var(--green); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(29,158,117,0.25); }

  .note-bubble { background: var(--bg3); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 12px 14px; margin: 14px 18px; font-size: 13px; color: var(--text2); line-height: 1.5; font-style: italic; }
  .note-empty  { padding: 12px 18px; font-size: 13px; color: var(--text3); font-style: italic; }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1px; background: var(--border); }
  .metric-box { background: var(--bg2); padding: 14px 12px; text-align: center; }
  .metric-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .metric-val { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .metric-val.green { color: var(--green); }
  .metric-val.amber { color: var(--amber); }
  .metric-val.red   { color: var(--red); }
  .metric-trend { font-size: 11px; color: var(--text3); display: flex; align-items: center; justify-content: center; gap: 3px; }
  .trend-up   { color: var(--green); }
  .trend-down { color: var(--red); }
  .trend-flat { color: var(--text3); }

  .training-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .training-box { background: var(--bg2); padding: 12px 16px; }
  .training-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .training-val { font-size: 13px; color: var(--text2); }
  .training-val.muted { color: var(--text3); font-style: italic; }

  .tss-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1px; background: var(--border); }
  .tss-box { background: var(--bg2); padding: 12px; text-align: center; }
  .tss-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .tss-val { font-size: 16px; font-weight: 700; color: var(--text2); }

  /* Macro chart */
  .chart-section { padding: 24px 28px; }
  .chart-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .chart-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
  .window-btns { display: flex; gap: 4px; }
  .window-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text3); border-radius: 6px; padding: 5px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .window-btn:hover { color: var(--text2); }
  .window-btn.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }

  .stream-toggles { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .stog { display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; user-select: none; }
  .stog:hover { background: var(--bg4); }
  .stog.off { opacity: 0.4; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  canvas.trend-chart { width: 100% !important; height: 200px !important; }

  .no-data { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; }

  /* Loading */
  .loading-inline { padding: 40px; text-align: center; font-size: 13px; color: var(--text3); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease forwards; }
</style>
</head>

<div class="sidebar">
  <div class="logo">Layer<span>.</span></div>
  <div class="nav-section">

<!-- Panels -->
<div class="panels">
  <!-- Left: athlete list -->
  <div class="panel-athletes">

      <div class="panel-title">Athlete profiles</div>
      <div class="panel-sub" id="panel-sub">Loading roster…</div>

      </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const SUPABASE_URL = 'https://eaqlyzvggjewavyxpbwk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcWx5enZnZ2pld2F2eXhwYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTI4NTgsImV4cCI6MjA5MjA2ODg1OH0.0zCSvFLEzQqmro9YxF-VjuAAHNfs1gWZbyqH22YQwJ8';
const p = new URLSearchParams(window.location.search);
const COACH_ID = p.get('coach') || '051dbc7b-15ad-45e0-bdb1-5bf19a7144c8';
const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

const COLORS = {
  sleep:      { line: '#4dc99a', fill: 'rgba(77,201,154,0.08)' },
  motivation: { line: '#f0a830', fill: 'rgba(240,168,48,0.08)' },
  stress:     { line: '#f07070', fill: 'rgba(240,112,112,0.08)' },
  readiness:  { line: '#7B8FF0', fill: 'rgba(123,143,240,0.08)' },
};

// Question ID map
const Q = {
  sleep:      '3f7f8eb1-62ae-4c26-91c1-5d45f55d6eb5',
  readiness:  '4462c210-4593-427c-83ce-c9ed8b8bdbe3',
  motivation: '583f8fb5-3713-4f56-be71-91517c7e2f57',
  stress:     '5eba99d5-5f60-4349-97c1-8f0673be4896',
  open:       '181d0da7-0a87-48de-8bdc-543a936f4d05',
};

async function fetchResponses(athleteId, since) {
  const qIds = Object.values(Q).join(',');
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/checkin_responses?athlete_id=eq.${athleteId}&question_id=in.(${qIds})&date=gte.${since}&select=date,question_id,score,text_response&order=date.asc`,
    { headers }
  );
  const rows = await res.json();
  if (!Array.isArray(rows)) return {};
  const byDate = {};
  rows.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = {};
    if (r.question_id === Q.sleep)      byDate[r.date].sleep      = r.score;
    if (r.question_id === Q.motivation) byDate[r.date].motivation = r.score;
    if (r.question_id === Q.stress)     byDate[r.date].stress     = r.score;
    if (r.question_id === Q.readiness)  byDate[r.date].readiness  = r.score;
    if (r.question_id === Q.open && r.text_response) byDate[r.date].text = r.text_response;
  });
  return byDate;
}

// Update nav links with coach param
if (p.get('coach')) {
  document.getElementById('nav-roster').href   = `dashboard.html?coach=${COACH_ID}`;
  document.getElementById('nav-messages').href = `messages.html?coach=${COACH_ID}`;
  document.getElementById('nav-macro').href    = `macro.html?coach=${COACH_ID}`;
  document.getElementById('nav-athletes').href = `athletes.html?coach=${COACH_ID}`;
  document.getElementById('nav-zones').href    = `zones.html?coach=${COACH_ID}`;
  document.getElementById('nav-questions').href= `questions.html?coach=${COACH_ID}`;
}

function getInitials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function avColor(name) {
  const colors = ['av-green','av-blue','av-amber','av-red','av-gray'];
  let h = 0; for (let c of (name||'')) h = (h*31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}
function scoreColor(v) {
  if (!v && v !== 0) return '';
  if (v >= 4) return 'green';
  if (v === 3) return 'amber';
  return 'red';
}
function today() {
  return new Date().toISOString().split('T')[0];
}
function daysAgo(n) {
  const d = new Date(); d.setDate(d.getDate()-n);
  return d.toISOString().split('T')[0];
}
function fmtDate(iso) {
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

let athletes = [];
let activeChart = null;
let activeAthleteId = null;
let activeWindow = '3M';

async function loadRoster() {
  const coachRes = await fetch(`${SUPABASE_URL}/rest/v1/coaches?id=eq.${COACH_ID}&select=name`, { headers });
  const coaches = await coachRes.json();
  if (coaches[0]) {
    const initials = getInitials(coaches[0].name);
    document.getElementById('coach-av').textContent = initials;
    document.getElementById('coach-name').textContent = coaches[0].name;
  }

  const athRes = await fetch(`${SUPABASE_URL}/rest/v1/athletes?coach_id=eq.${COACH_ID}&select=id,name,email&order=name.asc`, { headers });
  athletes = await athRes.json();

  document.getElementById('panel-sub').textContent = `${athletes.length} athlete${athletes.length!==1?'s':''}`;

  const list = document.getElementById('athlete-list');
  if (!athletes.length) {
    list.innerHTML = '<div class="loading-inline">No athletes yet.</div>';
    return;
  }

  // Fetch today's submissions
  const todayStr = today();
  const athleteIds = athletes.map(a => a.id).join(',');
  let subMap = {};
  try {
    const subRes = await fetch(`${SUPABASE_URL}/rest/v1/checkin_responses?athlete_id=in.(${athleteIds})&date=eq.${todayStr}&select=athlete_id`, { headers });
    const subs = await subRes.json();
    if (Array.isArray(subs)) subs.forEach(s => subMap[s.athlete_id] = true);
  } catch(e) { /* silent fail */ }

  list.innerHTML = athletes.map(a => {
    const submitted = !!subMap[a.id];
    return `
      <div class="athlete-row" id="row-${a.id}" onclick="selectAthlete('${a.id}')">
        <div class="av ${avColor(a.name)}">${getInitials(a.name)}</div>
        <div class="athlete-info">
          <div class="athlete-name">${a.name}</div>
          <div class="athlete-meta">${submitted ? 'Submitted today' : 'Not yet submitted'}</div>
        </div>
      </div>`;
  }).join('');

  // Auto-select if athlete param in URL
  const urlAthlete = p.get('athlete');
  if (urlAthlete) selectAthlete(urlAthlete);
}

async function selectAthlete(athleteId) {
  activeAthleteId = athleteId;

  // Highlight row
  document.querySelectorAll('.athlete-row').forEach(r => r.classList.remove('active'));
  const row = document.getElementById(`row-${athleteId}`);
  if (row) row.classList.add('active');

  const profile = document.getElementById('panel-profile');
  profile.innerHTML = '<div class="loading-inline" style="padding:80px"><div class="spinner"></div>Loading profile…</div>';

  const athlete = athletes.find(a => a.id === athleteId);
  if (!athlete) return;

  // Fetch today + 7-day history using checkin_responses
  const todayStr = today();
  const weekAgoStr = daysAgo(7);
  const byDate = await fetchResponses(athleteId, weekAgoStr);

  const ci = byDate[todayStr] || null;  // today's pivoted row or null

  // 7-day averages (excluding today)
  function calcAvg(key) {
    const vals = Object.entries(byDate)
      .filter(([d]) => d !== todayStr)
      .map(([,v]) => v[key])
      .filter(v => v != null);
    return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
  }
  const avgs = {
    sleep:      calcAvg('sleep'),
    motivation: calcAvg('motivation'),
    stress:     calcAvg('stress'),
    readiness:  calcAvg('readiness'),
  };

  function trendArrow(val, avg) {
    if (!val || !avg) return `<span class="trend-flat">— avg ${avg||'—'}</span>`;
    const diff = val - parseFloat(avg);
    if (diff > 0.3) return `<span class="trend-up">▲ ${diff.toFixed(1)}</span> <span style="color:var(--text3)">avg ${avg}</span>`;
    if (diff < -0.3) return `<span class="trend-down">▼ ${Math.abs(diff).toFixed(1)}</span> <span style="color:var(--text3)">avg ${avg}</span>`;
    return `<span class="trend-flat">— avg ${avg}</span>`;
  }

  const todayFmt = fmtDate(todayStr);
  const submittedTime = null; // date-only table, no timestamp
  const flagged = ci && (ci.sleep===1 || ci.motivation===1 || ci.stress===1 || ci.readiness===1);

  profile.innerHTML = `
    <div class="fade-up">
      <!-- Header -->
      <div class="profile-topbar">
        <div class="profile-identity">
          <div class="profile-av av ${avColor(athlete.name)}" style="width:48px;height:48px;font-size:16px;">${getInitials(athlete.name)}</div>
          <div>
            <div class="profile-name">${athlete.name}</div>
            <div class="profile-email">${athlete.email||''}</div>
          </div>
        </div>
        <div class="profile-actions">
          <button class="action-btn" onclick="window.location='messages.html?coach=${COACH_ID}&athlete=${athleteId}'">Message</button>
          <button class="action-btn" onclick="window.location='macro.html?coach=${COACH_ID}&athlete=${athleteId}'">Full trends</button>
        </div>
      </div>

      <!-- Daily summary -->
      <div class="section">
        <div class="section-title">Today's check-in</div>
        <div class="daily-card">
          <div class="daily-card-header">
            <div class="daily-date">${todayFmt}</div>
            <div style="display:flex;align-items:center;gap:10px;">
              ${submittedTime ? `<div class="daily-submitted">${submittedTime}</div>` : ''}
              ${flagged ? '<div class="flag-badge">Flagged</div>' : ci ? '<div class="ok-badge">All good</div>' : '<div style="font-size:12px;color:var(--text3)">Not submitted</div>'}
            </div>
          </div>

          ${ci ? `
            ${ci.text
              ? `<div class="note-bubble">"${ci.text}"</div>`
              : `<div class="note-empty">No note left today</div>`}
            <div class="metrics-grid">
              <div class="metric-box">
                <div class="metric-label">Sleep</div>
                <div class="metric-val ${scoreColor(ci.sleep)}">${ci.sleep??'—'}</div>
                <div class="metric-trend">${trendArrow(ci.sleep, avgs.sleep)}</div>
              </div>
              <div class="metric-box">
                <div class="metric-label">Motivation</div>
                <div class="metric-val ${scoreColor(ci.motivation)}">${ci.motivation??'—'}</div>
                <div class="metric-trend">${trendArrow(ci.motivation, avgs.motivation)}</div>
              </div>
              <div class="metric-box">
                <div class="metric-label">Stress</div>
                <div class="metric-val ${scoreColor(ci.stress)}">${ci.stress??'—'}</div>
                <div class="metric-trend">${trendArrow(ci.stress, avgs.stress)}</div>
              </div>
              <div class="metric-box">
                <div class="metric-label">Readiness</div>
                <div class="metric-val ${scoreColor(ci.readiness)}">${ci.readiness??'—'}</div>
                <div class="metric-trend">${trendArrow(ci.readiness, avgs.readiness)}</div>
              </div>
            </div>
            <div class="tss-row">
              <div class="tss-box"><div class="tss-label">TSS</div><div class="tss-val">—</div></div>
              <div class="tss-box"><div class="tss-label">CTL</div><div class="tss-val">—</div></div>
              <div class="tss-box"><div class="tss-label">ATL</div><div class="tss-val">—</div></div>
              <div class="tss-box"><div class="tss-label">Form</div><div class="tss-val">—</div></div>
            </div>
            <div class="training-row">
              <div class="training-box">
                <div class="training-label">Yesterday</div>
                <div class="training-val muted">Connect Training Peaks to see yesterday's workout</div>
              </div>
              <div class="training-box">
                <div class="training-label">Today · Prescribed</div>
                <div class="training-val muted">Connect Training Peaks to see today's session</div>
              </div>
            </div>
          ` : `<div class="no-data">No check-in submitted yet today.</div>`}
        </div>
      </div>

      <!-- Macro chart -->
      <div class="chart-section">
        <div class="chart-topbar">
          <div class="chart-title">Macro trends</div>
          <div class="window-btns">
            <button class="window-btn ${activeWindow==='1M'?'active':''}" onclick="setWindow('1M','${athleteId}')">1M</button>
            <button class="window-btn ${activeWindow==='3M'?'active':''}" onclick="setWindow('3M','${athleteId}')">3M</button>
            <button class="window-btn ${activeWindow==='6M'?'active':''}" onclick="setWindow('6M','${athleteId}')">6M</button>
            <button class="window-btn ${activeWindow==='12M'?'active':''}" onclick="setWindow('12M','${athleteId}')">12M</button>
          </div>
        </div>
        <div class="stream-toggles">
          <div class="stog" id="tog-sleep"      onclick="toggleStream('sleep','${athleteId}')">      <div class="sdot" style="background:#4dc99a"></div>Sleep</div>
          <div class="stog" id="tog-motivation" onclick="toggleStream('motivation','${athleteId}')"> <div class="sdot" style="background:#f0a830"></div>Motivation</div>
          <div class="stog" id="tog-stress"     onclick="toggleStream('stress','${athleteId}')">     <div class="sdot" style="background:#f07070"></div>Stress</div>
          <div class="stog" id="tog-readiness"  onclick="toggleStream('readiness','${athleteId}')">  <div class="sdot" style="background:#7B8FF0"></div>Readiness</div>
        </div>
        <div class="chart-wrap">
          <canvas id="macro-chart" class="trend-chart"></canvas>
        </div>
      </div>
    </div>`;

  await loadChart(athleteId);
}

const streamVisible = { sleep: true, motivation: true, stress: true, readiness: true };

async function loadChart(athleteId) {
  const days = activeWindow === '1M' ? 30 : activeWindow === '3M' ? 90 : activeWindow === '6M' ? 180 : 365;
  const since = daysAgo(days);

  const byDate = await fetchResponses(athleteId, since);
  const entries = Object.entries(byDate).sort(([a],[b]) => a.localeCompare(b));

  const canvas = document.getElementById('macro-chart');
  if (!canvas) return;

  if (!entries.length) {
    canvas.parentElement.innerHTML = '<div class="no-data">No data for this period.</div>';
    return;
  }

  const labels = entries.map(([d]) => {
    const dt = new Date(d+'T00:00:00');
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });

  function makeDataset(key, label) {
    return {
      label,
      data: entries.map(([,v]) => v[key] ?? null),
      borderColor: COLORS[key].line,
      backgroundColor: COLORS[key].fill,
      borderWidth: 2,
      pointRadius: entries.length > 60 ? 0 : 3,
      pointHoverRadius: 5,
      tension: 0.4,
      fill: true,
      hidden: !streamVisible[key],
    };
  }

  if (activeChart) activeChart.destroy();
  activeChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        makeDataset('sleep',      'Sleep'),
        makeDataset('motivation', 'Motivation'),
        makeDataset('stress',     'Stress'),
        makeDataset('readiness',  'Readiness'),
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1c1c',
          borderColor: '#333',
          borderWidth: 1,
          titleColor: '#b0b0b0',
          bodyColor: '#f0f0f0',
          padding: 10,
        }
      },
      scales: {
        x: { grid: { color: '#2a2a2a' }, ticks: { color: '#666', maxTicksLimit: 8 } },
        y: { min: 1, max: 5, grid: { color: '#2a2a2a' }, ticks: { color: '#666', stepSize: 1 } }
      }
    }
  });
}

function toggleStream(key, athleteId) {
  streamVisible[key] = !streamVisible[key];
  const tog = document.getElementById(`tog-${key}`);
  if (tog) tog.classList.toggle('off', !streamVisible[key]);
  if (activeChart) {
    const idx = ['sleep','motivation','stress','readiness'].indexOf(key);
    if (activeChart.data.datasets[idx]) {
      activeChart.data.datasets[idx].hidden = !streamVisible[key];
      activeChart.update();
    }
  }
}

function setWindow(w, athleteId) {
  activeWindow = w;
  document.querySelectorAll('.window-btn').forEach(b => b.classList.toggle('active', b.textContent === w));
  loadChart(athleteId);
}

loadRoster().catch(err => {
  console.error(err);
  document.getElementById('athlete-list').innerHTML = '<div class="loading-inline">Something went wrong. Please refresh.</div>';
});
</script>
</body>
